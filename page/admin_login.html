<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Login - Melody Furniture</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#2c1100",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#4b2200",
                        "primary-container": "#0f2c59",
                        "on-tertiary-container": "#c5875a",
                        "surface-container-high": "#dde9ff",
                        "surface-container": "#e6eeff",
                        "tertiary-fixed": "#ffdcc6",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary": "#ffffff",
                        "outline": "#747780",
                        "on-background": "#0d1c2f",
                        "primary-fixed-dim": "#aec7fd",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#591d00",
                        "on-primary-fixed-variant": "#2d4674",
                        "on-secondary-fixed-variant": "#7d2d00",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#ffb597",
                        "inverse-surface": "#233144",
                        "border-subtle": "#E2E8F0",
                        "background": "#f8f9ff",
                        "on-surface-variant": "#44474f",
                        "surface-container-low": "#eff4ff",
                        "brand-blue-dark": "#0A1E3D",
                        "bg-alt": "#F8FAFC",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#6a3b15",
                        "on-surface": "#0d1c2f",
                        "bg-main": "#FFFFFF",
                        "tertiary-fixed-dim": "#fdb787",
                        "secondary-container": "#fd6c22",
                        "on-secondary-fixed": "#360f00",
                        "on-primary-container": "#7c94c8",
                        "on-primary": "#ffffff",
                        "secondary": "#a43d00",
                        "outline-variant": "#c4c6d0",
                        "surface": "#f8f9ff",
                        "surface-tint": "#465e8e",
                        "surface-dim": "#ccdbf4",
                        "inverse-primary": "#aec7fd",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-bright": "#f8f9ff",
                        "primary": "#00173b",
                        "inverse-on-surface": "#ebf1ff",
                        "on-primary-fixed": "#001a41",
                        "surface-container-highest": "#d5e3fd",
                        "on-tertiary-fixed": "#301400",
                        "surface-variant": "#d5e3fd",
                        "secondary-fixed": "#ffdbcd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "unit": "8px",
                        "margin-desktop": "40px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "price-lg": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "price-lg": ["20px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }]

            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-bg-alt text-on-surface antialiased min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">

    <main class="w-full max-w-[420px] bg-bg-main rounded-xl p-6 sm:p-8 border border-border-subtle shadow-md flex flex-col gap-6 sm:gap-8 transition-all duration-300">
        
        <header class="flex flex-col items-center text-center gap-2">
            <div class="w-14 h-14 sm:w-16 sm:h-16 bg-bg-alt border border-border-subtle rounded-xl flex items-center justify-center mb-1 transition-all">
                <span class="material-symbols-outlined text-primary-container text-2xl sm:text-3xl" data-icon="storefront">storefront</span>
            </div>
            <h1 class="font-headline-md text-xl sm:text-2xl font-bold text-primary-container">Admin Control Center</h1>
            <p class="font-body-md text-xs sm:text-sm text-on-surface-variant leading-relaxed">Secure access to system monitoring and configurations</p>
        </header>
        
        <form class="flex flex-col gap-5 sm:gap-6" onsubmit="event.preventDefault();">
            <div class="flex flex-col gap-1.5">
                <label class="font-label-sm text-xs sm:text-sm font-semibold text-[#334155]" for="email">Email Address</label>
                <input class="w-full h-11 sm:h-12 bg-bg-alt border border-border-subtle rounded-lg px-4 font-body-md text-sm sm:text-base text-on-surface placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" 
                       id="email" name="email" placeholder="admin@melodyfurniture.com" required type="email"/>
            </div>
            
            <div class="flex flex-col gap-1.5">
                <label class="font-label-sm text-xs sm:text-sm font-semibold text-[#334155]" for="password">Password</label>
                <div class="relative">
                    <input class="w-full h-11 sm:h-12 bg-bg-alt border border-border-subtle rounded-lg pl-4 pr-12 font-body-md text-sm sm:text-base text-on-surface placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" 
                           id="password" name="password" placeholder="••••••••" required type="password"/>
                    <button id="togglePassword" aria-label="Toggle password visibility" class="absolute right-0 top-0 h-11 sm:h-12 w-12 flex items-center justify-center text-on-surface-variant hover:text-primary-container transition-colors focus:outline-none" type="button">
                        <span class="material-symbols-outlined text-xl" id="eyeIcon">visibility</span>
                    </button>
                </div>
            </div>
            
            <div class="flex flex-row items-center justify-between mt-1 text-xs sm:text-sm">
                <label class="flex items-center gap-2 cursor-pointer group select-none">
                    <input class="w-4 h-4 rounded border-border-subtle text-primary-container focus:ring-primary-container cursor-pointer transition-colors" type="checkbox"/>
                    <span class="font-label-sm text-on-surface-variant group-hover:text-primary-container transition-colors font-medium">Remember me</span>
                </label>
                <a class="font-label-sm text-primary-container font-medium hover:underline decoration-primary-container/30 underline-offset-4 transition-all" href="#">Forgot Password?</a>
            </div>
            
            <a href="dashboard_admin.html" class="w-full h-11 sm:h-12 bg-[#F26419] hover:bg-[#d95816] text-white font-semibold rounded-lg transition-all flex items-center justify-center gap-2 mt-2 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#F26419] shadow-sm text-sm sm:text-base tracking-wide" type="submit">
                Sign In to Dashboard
                <span class="material-symbols-outlined text-lg sm:text-xl" data-icon="arrow_forward">arrow_forward</span>
            </a>
        </form>
        
        <footer class="text-center border-t border-border-subtle pt-5">
            <p class="font-label-sm text-xs text-on-surface-variant font-medium">© 2026 Melody Furniture. All rights reserved.</p>
        </footer>
    </main>

    <script>
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePasswordBtn.addEventListener('click', function() {
            // Ubah tipe input
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Ubah icon teks material design
            eyeIcon.innerText = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
</body>
</html>
